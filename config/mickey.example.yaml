server:
  host: "127.0.0.1"
  port: 8765
  auth:
    enabled: true
    bearer_token_env: "OTA_GATEWAY_BEARER_TOKEN"
    allow_loopback_without_auth: true
  rate_limit:
    enabled: true
    window_ms: 60000
    max_requests: 120
    trust_proxy_headers: true

workspaces:
  - id: "mickey"
    name: "Mickey"
    root: "/absolute/path/to/ota-computer-use-gateway"
    allow_read: true
    allow_write: true
    allow_patch: true
    allow_tests: true
    allow_screen: false
    allow_mouse_keyboard: false
    browser:
      profiles:
        - label: "mickey"
          user_data_dir: "/absolute/path/to/chrome-profile"
          cdp_host: "127.0.0.1"
          cdp_port: 9222
          display: ":20"
          headed: true
          default: true
          launch: false
    commands:
      check: "npm run check"
      smoke: "npm run smoke:stdio"

security:
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
  denied_globs:
    - ".env"
    - ".env.*"
    - "**/*.pem"
    - "**/*.key"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/.ssh/**"
    - "**/.gnupg/**"
    - "**/.aws/**"
    - "**/.kube/**"
