server:
  host: "127.0.0.1"
  port: 8765

workspaces:
  - id: "ota-computer-use-gateway"
    name: "OTA Computer-Use Gateway"
    root: "/home/genesis/workspace/projects/ota-computer-use-gateway"
    allow_read: true
    allow_write: true
    allow_patch: true
    allow_tests: false
    allow_screen: false
    allow_mouse_keyboard: false
    commands:
      check: "npm run check"
      smoke: "npm run smoke:stdio"

security:
  # Calvin policy: no hidden path/secret deny lists in OTA/Threaddex configs.
  # Do not add deny globs, secret-path blocks, or credential-name blocks without Calvin's explicit approval.
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
