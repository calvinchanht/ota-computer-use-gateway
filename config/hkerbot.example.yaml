server:
  host: "127.0.0.1"
  port: 8771
  auth:
    enabled: true
    bearer_token_env: "OTA_GATEWAY_BEARER_TOKEN"
    allow_loopback_without_auth: false
  tool_annotations:
    mode: "private_high_autonomy"
  rate_limit:
    enabled: true
    window_ms: 60000
    max_requests: 120
    trust_proxy_headers: true

workspaces:
  - id: "hkerbot"
    name: "HKerBot"
    agent_dir: "/home/molt/hkerbot/workspace/.agent"
    root: "/home/molt/hkerbot/workspace"
    api_sets:
      workspace: true
      browser: true
      computer: false
      machine_admin: false
      estate_admin: false
    allow_read: true
    allow_write: true
    allow_patch: true
    allow_tests: true
    allow_screen: true
    allow_mouse_keyboard: true
    browser:
      profiles:
        - label: "hkerbot-social"
          description: "HKerBot social/MBS browser for x.com, Instagram, and Meta Business Suite."
          user_data_dir: "/home/molt/hkerbot/workspace/.browser-profiles/hker"
          cdp_host: "127.0.0.1"
          cdp_port: 20223
          display: ":20"
          headed: true
          default: true
          launch: false
        - label: "hkerbot-patreon"
          description: "HKerBot Patreon browser."
          user_data_dir: "/home/molt/hkerbot/workspace/.browser-profiles/hker-patreon-21223"
          cdp_host: "127.0.0.1"
          cdp_port: 21223
          display: ":20"
          headed: true
          default: false
          launch: false
    git:
      github_token_file: "/home/molt/hkerbot/workspace/secrets/hker_github_pat.txt"
    commands:
      check: "python3 -m py_compile scripts/hkerschedule_daily_publish_all.py scripts/hkerschedule_daily_images.py"
      patreon_preflight: "python3 scripts/patreon_preflight.py"

security:
  max_file_bytes: 200000
  max_response_bytes: 70000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
  protect_secret_paths: true
  denied_globs:
    - "secrets/**"
    - "**/*token*"
    - "**/*secret*"
    - "**/*pat*"
    - "**/auth-profiles.json"
