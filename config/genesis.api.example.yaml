server:
  host: "127.0.0.1"
  port: 8770
  auth:
    enabled: true
    bearer_token_env: "GENESIS_API_BEARER_TOKEN"
    allow_loopback_without_auth: true
  exposed_tools:
    - heartbeat
    - workspace_status
    - get_tool_profile
    - get_workspace_policy
    - genesis_bootstrap
    - genesis_estate_overview
    - genesis_agent_deep_dive
    - genesis_host_deep_dive
    - genesis_safe_diagnostic

workspaces:
  - id: "genesis"
    name: "Webchat Genesis"
    root: "/home/genesis/workspace"
    allow_read: true
    allow_write: false
    allow_patch: false
    allow_tests: false
    allow_screen: false
    allow_mouse_keyboard: false
    commands: {}

security:
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
  protect_secret_paths: true
  denied_globs:
    - ".env"
    - ".env.*"
    - "**/*.pem"
    - "**/*.key"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/.ssh/**"
    - "**/.gnupg/**"
    - "**/.aws/**"
    - "**/.kube/**"
    - "**/secrets/**"
