server:
  host: "127.0.0.1"
  port: 8766
  auth:
    enabled: true
    bearer_token_env: "OTA_GATEWAY_BEARER_TOKEN"
    allow_loopback_without_auth: false
  tool_annotations:
    mode: "private_high_autonomy"
  rate_limit:
    enabled: true
    window_ms: 60000
    max_requests: 120
    trust_proxy_headers: true

workspaces:
  - id: "catalyst"
    name: "Catalyst"
    # Set this to Catalyst's actual workspace root on the host running the gateway.
    # Current estate card points to a PersonalVPS Catalyst lane; verify before deploying.
    root: "/absolute/path/to/catalyst/workspace"
    api_sets:
      workspace: true
      browser: true
      computer: false
      machine_admin: false
      estate_admin: false
    allow_read: true
    # Enable writes for continuity/checkpoints and approved workspace edits.
    allow_write: true
    allow_patch: true
    allow_tests: true
    # Browser/job workflows need screen observation and browser actions, but policy must
    # still stop for CAPTCHA, human verification, sensitive account decisions, and submissions.
    allow_screen: true
    allow_mouse_keyboard: true
    browser:
      profiles:
        - label: "catalyst"
          user_data_dir: "/absolute/path/to/catalyst/chrome-profile"
          cdp_host: "127.0.0.1"
          cdp_port: 9223
          display: ":20"
          headed: true
          default: true
          launch: false
    git:
      github_token_file: "/absolute/path/to/catalyst/workspace/secrets/catalyst_github_pat.txt"
    commands:
      check: "npm run check"
      smoke: "npm run smoke:stdio"
      # Push current branch of Catalyst career-control-panel using a local secret.
      # The script must not print or log the PAT.
      push_career_control_panel: "bin/push-career-control-panel.sh"

security:
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
  # Catalyst is an OpenClaw-like full workspace agent: all paths inside the
  # configured workspace root are accessible. The root boundary still prevents
  # escaping to host paths outside the workspace.
  protect_secret_paths: false
  denied_globs: []
