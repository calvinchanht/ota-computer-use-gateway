server:
  host: "127.0.0.1"
  port: 8765
  auth:
    enabled: false
    bearer_token_env: "OTA_GATEWAY_BEARER_TOKEN"
    allow_loopback_without_auth: true
  tool_annotations:
    mode: "honest"
  rate_limit:
    enabled: true
    window_ms: 60000
    max_requests: 120
    trust_proxy_headers: false

workspaces:
  - id: "example"
    name: "Example Project"
    agent_dir: "/absolute/path/to/agent-state/.agent"
    root: "/absolute/path/to/project"
    allow_read: true
    allow_write: true
    allow_patch: true
    allow_tests: false
    allow_screen: false
    allow_mouse_keyboard: false
    api_sets:
      workspace: true
      browser: false
      computer: false
      computer_windows: false
      machine_admin: false
      estate_admin: false
    windows_computer:
      enabled: false
      allow_screenshot: false
      allow_uia_tree: false
      allow_mouse: false
      allow_keyboard: false
      allow_clipboard: false
      allow_window_management: false
      allow_app_launch: false
      allow_process_attach: false
      allow_multi_monitor: true
    browser:
      profiles:
        - label: "example"
          user_data_dir: "/absolute/path/to/chrome-profile"
          cdp_host: "127.0.0.1"
          cdp_port: 9222
          display: ":20"
          headed: true
          default: true
          launch: false
    commands:
      test: "npm test"
      lint: "npm run lint"
      build: "npm run build"
    git:
      github_token_file: "/absolute/path/to/secrets/example_github_pat.txt"
      # Optional: set this to a PAT-backed wrapper such as /home/genesis/workspace/bin/gh-genesis.
      # If omitted, the github tool invokes github_cli with GH_TOKEN/GITHUB_TOKEN from github_token_file.
      # github_cli_wrapper: "/absolute/path/to/bin/gh-wrapper"
      github_cli: "gh"

command_runtime:
  # HTTP run_command remains argv-first. This shell is used only by legacy shell-string
  # surfaces such as MCP run_command(command), run_configured_command, and start_process(command).
  # On Windows hosts, prefer PowerShell 7 by explicit executable path instead of Windows Terminal.
  preferred_shell: "platform-default"
  # Windows example:
  # preferred_shell: "powershell7"
  # shell:
  #   command: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
  #   args:
  #     - "-NoLogo"
  #     - "-NoProfile"
  #     - "-NonInteractive"
  #     - "-ExecutionPolicy"
  #     - "Bypass"
  #     - "-Command"

security:
  # Calvin policy: no hidden path/secret deny lists in OTA/Threaddex configs.
  # Do not add deny globs, secret-path blocks, or credential-name blocks without Calvin's explicit approval.
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
