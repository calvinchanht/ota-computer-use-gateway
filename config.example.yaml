server:
  host: "127.0.0.1"
  port: 8765
  auth:
    enabled: false
    bearer_token_env: "OTA_GATEWAY_BEARER_TOKEN"
    allow_loopback_without_auth: true
  rate_limit:
    enabled: true
    window_ms: 60000
    max_requests: 120
    trust_proxy_headers: false

workspaces:
  - id: "example"
    name: "Example Project"
    root: "/absolute/path/to/project"
    allow_read: true
    allow_write: true
    allow_patch: true
    allow_tests: false
    allow_screen: false
    allow_mouse_keyboard: false
    commands:
      test: "npm test"
      lint: "npm run lint"
      build: "npm run build"

security:
  max_file_bytes: 200000
  max_response_bytes: 50000
  max_request_bytes: 1000000
  max_search_results: 50
  max_exec_ms: 120000
  denied_globs:
    - ".env"
    - ".env.*"
    - "**/*.pem"
    - "**/*.key"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/.ssh/**"
    - "**/.gnupg/**"
    - "**/.aws/**"
    - "**/.kube/**"
