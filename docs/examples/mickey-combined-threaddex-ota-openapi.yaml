openapi: 3.1.0
info:
  title: Mickey Threaddex + OTA Gateway API
  version: 1.0.3
servers:
  - url: https://mickey-api.unrealize.com
security:
  - bearerAuth: []
paths:
  /v1/schema:
    get:
      operationId: getSchema
      summary: Read current Job API protocol/schema metadata
      responses:
        '200':
          description: Protocol/schema descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaDescriptor'
  /v1/schema/openapi.yaml:
    get:
      operationId: getOpenApiSchema
      summary: Read current OpenAPI schema YAML
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /v1/thread-anchor:
    post:
      operationId: anchorCurrentThread
      summary: Anchor the current ChatGPT thread for this Threaddex agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chat_url:
                  type: string
                  description: Full chatgpt.com conversation URL.
                chat_id:
                  type: string
                  description: ChatGPT conversation id. Requires configured agent Custom GPT URL.
                conversation_id:
                  type: string
                  description: Alias for chat_id.
                custom_gpt_url:
                  type: string
                  description: Optional Custom GPT base URL override.
                source:
                  type: string
                actor:
                  type: string
                source_job_id:
                  type: string
      responses:
        '200':
          description: Thread anchor persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agent_id:
                    type: string
                  chat_url:
                    type: string
                  chat_id:
                    type: string
                  custom_gpt_url:
                    type: string
                  source:
                    type: string
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /v1/job:
    get:
      operationId: getJob
      summary: Read a Threaddex job using query parameters
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      responses:
        '200':
          description: Job payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /v1/job/{job_id}:
    get:
      operationId: getJobByPath
      summary: Read a Threaddex job using a path parameter
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      responses:
        '200':
          description: Job payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /v1/job/deliver:
    post:
      operationId: deliverJobQuery
      summary: Deliver the substantive result for a Threaddex job using query parameters
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schema_version:
                  type: string
                  description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
                protocol_version:
                  type: string
                  description: Optional client protocol version, e.g. job-api/1.0.1.
                text:
                  type: string
                  description: Substantive answer to send to the job delivery target
              required:
                - text
      responses:
        '200':
          description: Delivery accepted or duplicate delivery acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  protocol_version:
                    type: string
                  schema_version:
                    type: string
                  ok:
                    type: boolean
                  job_id:
                    type: string
                  state:
                    type: string
                  duplicate:
                    type: boolean
                  recovered:
                    type: boolean
                  delivery:
                    type: object
                    additionalProperties: true
                required:
                  - protocol_version
                  - schema_version
                  - ok
                  - job_id
                  - state
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'

  /v1/job/{job_id}/deliver:
    post:
      operationId: deliverJob
      summary: Deliver the substantive result for a Threaddex job
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schema_version:
                  type: string
                  description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
                protocol_version:
                  type: string
                  description: Optional client protocol version, e.g. job-api/1.0.1.
                text:
                  type: string
                  description: Substantive answer to send to the job delivery target
              required:
                - text
      responses:
        '200':
          description: Delivery accepted or duplicate delivery acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  protocol_version:
                    type: string
                  schema_version:
                    type: string
                  ok:
                    type: boolean
                  job_id:
                    type: string
                  state:
                    type: string
                  duplicate:
                    type: boolean
                  recovered:
                    type: boolean
                  delivery:
                    type: object
                    additionalProperties: true
                required:
                  - protocol_version
                  - schema_version
                  - ok
                  - job_id
                  - state
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'

  /v1/job/progress:
    post:
      operationId: deliverJobProgressQuery
      summary: Send a non-terminal progress update for a Threaddex job using query parameters
      description: Forwards progress text to the job delivery target without completing the job. Use concise operational updates, not hidden chain-of-thought or secrets.
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressInput'
      responses:
        '200':
          description: Progress accepted or duplicate progress acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
  /v1/job/{job_id}/progress:
    post:
      operationId: deliverJobProgress
      summary: Send a non-terminal progress update for a Threaddex job
      description: Forwards progress text to the job delivery target without completing the job. Use concise operational updates, not hidden chain-of-thought or secrets.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressInput'
      responses:
        '200':
          description: Progress accepted or duplicate progress acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'

  /v1/job/continuation:
    post:
      operationId: requestContinuationQuery
      summary: Request a bounded continuation for a long-running Threaddex job using query parameters
      description: Records a checkpoint and asks Threaddex to continue this job later. This is not final delivery. Use only when there is no human gate.
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinuationInput'
      responses:
        '200':
          description: Continuation request recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContinuationResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
  /v1/job/{job_id}/continuation:
    post:
      operationId: requestContinuation
      summary: Request a bounded continuation for a long-running Threaddex job
      description: Records a checkpoint and asks Threaddex to continue this job later. This is not final delivery. Use only when there is no human gate.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id from the job prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinuationInput'
      responses:
        '200':
          description: Continuation request recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContinuationResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'

  /v1/job/agent-message:
    post:
      operationId: sendAgentMessageQuery
      summary: Send a first-class agent-to-agent message using query parameters
      description: Creates a target-agent job without using Telegram as the transport. Telegram may receive an optional visibility/audit copy depending on /agentmsg mode.
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
          description: Parent job id from the initiating agent prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentMessageInput'
      responses:
        '200':
          description: Agent message accepted and target job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMessageResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
  /v1/job/{job_id}/agent-message:
    post:
      operationId: sendAgentMessage
      summary: Send a first-class agent-to-agent message
      description: Creates a target-agent job without using Telegram as the transport. Telegram may receive an optional visibility/audit copy depending on /agentmsg mode.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Parent job id from the initiating agent prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentMessageInput'
      responses:
        '200':
          description: Agent message accepted and target job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMessageResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
  /v1/schedules:
    get:
      operationId: listSchedules
      summary: List schedules owned by this agent
      parameters:
        - name: auth_job_id
          in: query
          required: true
          schema:
            type: string
          description: Current job id from the job prompt. Used to scope schedule management.
      responses:
        '200':
          description: Schedule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'
                required:
                  - schedules
        '401':
          $ref: '#/components/responses/Error'
    post:
      operationId: upsertSchedule
      summary: Create or update a schedule or agent heartbeat
      parameters:
        - name: auth_job_id
          in: query
          required: true
          schema:
            type: string
          description: Current job id from the job prompt. Used to scope schedule management.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleInput'
      responses:
        '200':
          description: Created or updated schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /v1/schedules/{schedule_id}/enable:
    post:
      operationId: enableSchedule
      summary: Enable a schedule
      parameters:
        - name: schedule_id
          in: path
          required: true
          schema:
            type: string
        - name: auth_job_id
          in: query
          required: true
          schema:
            type: string
          description: Current job id from the job prompt. Used to scope schedule management.
      responses:
        '200':
          description: Enabled schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /v1/schedules/{schedule_id}/disable:
    post:
      operationId: disableSchedule
      summary: Disable a schedule
      parameters:
        - name: schedule_id
          in: path
          required: true
          schema:
            type: string
        - name: auth_job_id
          in: query
          required: true
          schema:
            type: string
          description: Current job id from the job prompt. Used to scope schedule management.
      responses:
        '200':
          description: Disabled schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

  /v1/conditional-runs:
    get:
      operationId: listConditionalRuns
      summary: List recent conditional schedule checker runs
      responses:
        '200':
          description: Recent conditional runs
  /v1/conditional-runs/{schedule_id}:
    get:
      operationId: listConditionalRunsForSchedule
      summary: List recent conditional checker runs for one schedule
      parameters:
        - in: path
          name: schedule_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recent conditional runs for schedule
  /v1/schedules/{schedule_id}/check:
    post:
      operationId: checkConditionalScheduleNow
      summary: Run a conditional schedule checker immediately
      parameters:
        - in: path
          name: schedule_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conditional run result
  /api/v1/tool:
    post:
      operationId: mickey_gateway_request
      summary: Run one Mickey OTA Gateway workspace/browser tool call.
      description: Use for machine capability such as workspace listing, file reads/writes, bounded commands, browser visible-state, and async recovery. Always pass workspace_id=mickey.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MickeyGatewayRequest'
      responses:
        '200':
          description: Gateway tool result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MickeyGatewayResponse'
  /api/v1/batch:
    post:
      operationId: mickey_gateway_batch
      summary: Run multiple Mickey OTA Gateway tool calls.
      description: Use for grouped workspace read/write/read-back or smoke flows. Prefer idempotency_key for writes.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MickeyGatewayBatchRequest'
      responses:
        '200':
          description: Gateway batch result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MickeyGatewayResponse'
  /api/v1/runs/{run_id}:
    get:
      operationId: get_mickey_gateway_run
      summary: Retrieve a previous Mickey OTA Gateway async run.
      description: Use this when a Gateway response includes api.run_id. Do not retry the original non-idempotent call.
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stored run record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MickeyGatewayResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              state:
                type: string
              limit:
                type: integer
  schemas:
    MickeyGatewayBatchRequest:
      type: object
      additionalProperties: false
      required: [steps]
      properties:
        idempotency_key:
          type: string
        steps:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/MickeyGatewayStep'
    MickeyGatewayStep:
      type: object
      additionalProperties: false
      required: [tool, arguments]
      properties:
        tool:
          $ref: '#/components/schemas/MickeyGatewayToolName'
        arguments:
          $ref: '#/components/schemas/MickeyGatewayArguments'
    MickeyGatewayRequest:
      type: object
      additionalProperties: false
      required: [tool, arguments]
      properties:
        idempotency_key:
          type: string
          description: Optional stable retry key. Use a unique key for writes.
        tool:
          $ref: '#/components/schemas/MickeyGatewayToolName'
        arguments:
          $ref: '#/components/schemas/MickeyGatewayArguments'
    MickeyGatewayToolName:
      type: string
      enum:
        - heartbeat
        - workspace_status
        - get_workspace_policy
        - get_tool_profile
        - list_dir
        - stat_path
        - tree
        - read_file
        - read_binary_file
        - write_file
        - write_binary_file
        - edit_file
        - search_files
        - git_status
        - git_diff
        - run_command
        - start_process
        - list_processes
        - read_process
        - write_process
        - stop_process
        - browser_status
        - list_browser_tabs
        - browser_visible_state
        - browser_tail
    MickeyGatewayArguments:
      type: object
      additionalProperties: true
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [mickey]
      description: Tool-specific arguments. Use workspace_id=mickey. The workspace root is scoped by OTA Gateway policy and includes runtime/threaddex-mickey/inbox for attachment file management. Do not request or reveal secrets.
    MickeyGatewayResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        summary:
          type: string
        data:
          type: object
          additionalProperties: true
        api:
          type: object
          additionalProperties: true

    SchemaDescriptor:
      type: object
      properties:
        protocol_version:
          type: string
        schema_version:
          type: string
        min_supported_protocol_version:
          type: string
        agent_id:
          type: string
        capabilities:
          type: object
          additionalProperties:
            type: boolean
        openapi_url:
          type: string
      required:
        - protocol_version
        - schema_version
        - min_supported_protocol_version
        - capabilities
        - openapi_url
    Job:
      type: object
      properties:
        protocol_version:
          type: string
        schema_version:
          type: string
        job_id:
          type: string
        from:
          type: object
          additionalProperties: true
        to:
          type: object
          additionalProperties: true
        source:
          type: string
        content:
          type: object
          properties:
            text:
              type: string
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/JobAttachment'
          required:
            - text
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/JobAttachment'
        metadata:
          type: object
          additionalProperties: true
        delivery_contract:
          $ref: '#/components/schemas/DeliveryContract'
        continuation_contract:
          type: object
          additionalProperties: true
        state:
          type: string
        created_at:
          type: string
      required:
        - protocol_version
        - schema_version
        - job_id
        - source
        - content
        - state

    JobAttachment:
      type: object
      description: Canonical web-readable attachment URL. Agents should use only this URL and should not parse attachment bytes from alternate payload formats.
      properties:
        url:
          type: string
          format: uri
      required:
        - url

    DeliveryContract:
      type: object
      description: Instructions for Telegram-origin jobs. Agents should use Job API progress/final delivery and keep webchat prose clean.
      properties:
        progress:
          type: string
          enum: [api]
        final:
          type: string
          enum: [api]
        visible_webchat_progress:
          type: boolean
        target:
          type: object
          properties:
            type:
              type: string
              enum: [telegram]
            id:
              type: string
          required:
            - type
            - id
        guidance:
          type: string
      required:
        - progress
        - final
        - visible_webchat_progress
        - target


    AgentMessageInput:
      type: object
      properties:
        protocol_version:
          type: string
          description: Optional client protocol version, e.g. job-api/1.0.1.
        schema_version:
          type: string
          description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
        to_agent_id:
          type: string
          description: Target Threaddex agent id, e.g. catalyst.
        provider_id:
          type: string
          description: Optional target provider id. Defaults to the parent job provider id.
        text:
          type: string
          description: Agent-to-agent task text. Do not include hidden chain-of-thought or secrets.
        expect_reply:
          type: boolean
          description: Whether the initiating agent expects a reply. Defaults to true.
        seq:
          oneOf:
            - type: integer
            - type: string
          description: Optional stable sequence used to generate an idempotent agent_message_id.
      required:
        - to_agent_id
        - text
    AgentMessageResult:
      type: object
      properties:
        protocol_version:
          type: string
        schema_version:
          type: string
        ok:
          type: boolean
        agent_message_id:
          type: string
        target_job_id:
          type: string
        to_agent_id:
          type: string
        state:
          type: string
        telegram_mirror:
          type: boolean
        mirror:
          type: object
          additionalProperties: true
      required:
        - protocol_version
        - schema_version
        - ok
        - agent_message_id
        - target_job_id
        - to_agent_id
        - state
        - telegram_mirror
    ProgressInput:
      type: object
      properties:
        protocol_version:
          type: string
          description: Optional client protocol version, e.g. job-api/1.0.1.
        schema_version:
          type: string
          description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
        text:
          type: string
          description: Progress text to send immediately to the job delivery target. Do not include hidden chain-of-thought or secrets.
        seq:
          oneOf:
            - type: integer
            - type: string
          description: Optional idempotency sequence for progress dedupe. If absent, text hash is used.
      required:
        - text
    ProgressResult:
      type: object
      properties:
        protocol_version:
          type: string
        schema_version:
          type: string
        ok:
          type: boolean
        job_id:
          type: string
        state:
          type: string
        progress:
          type: boolean
        duplicate:
          type: boolean
        delivery:
          type: object
          additionalProperties: true
      required:
        - protocol_version
        - schema_version
        - ok
        - job_id
        - state
        - progress
        - duplicate
    ContinuationInput:
      type: object
      properties:
        protocol_version:
          type: string
          description: Optional client protocol version, e.g. job-api/1.0.1.
        schema_version:
          type: string
          description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
        reason:
          type: string
          description: Why continuation is needed, e.g. time_budget or goal_checkpoint.
        checkpoint:
          type: string
          description: What was done, what remains, and why continuation is safe.
        next_prompt:
          type: string
          description: "Optional prompt to use for continuation. Defaults to cont job: <job_id>."
        human_gate:
          type: boolean
          description: Must be false or omitted; true is rejected because continuation must stop for human gates.
        max_continuations:
          type: integer
          description: Optional bounded max continuation count. Server bounds accepted values to 1..20.
      required:
        - checkpoint
    ContinuationResult:
      type: object
      properties:
        protocol_version:
          type: string
        schema_version:
          type: string
        ok:
          type: boolean
        continuation:
          type: boolean
        job_id:
          type: string
        state:
          type: string
        reason:
          type: string
        checkpoint:
          type: string
        next_prompt:
          type: string
        sentinel:
          type: string
        human_gate:
          type: boolean
        continuation_count:
          type: integer
        max_continuations:
          type: integer
      required:
        - protocol_version
        - schema_version
        - ok
        - continuation
        - job_id
        - state
        - checkpoint
        - continuation_count
        - max_continuations

    ScheduleInput:
      type: object
      properties:
        protocol_version:
          type: string
          description: Optional client protocol version, e.g. job-api/1.0.1.
        schema_version:
          type: string
          description: Optional client schema version, e.g. 1.0.3. Server remains compatible with 1.0.2 clients.
        schedule_id:
          type: string
        enabled:
          type: boolean
        mode:
          type: string
          enum: [job, conditional]
          description: Use conditional for a bounded non-AI checker that only creates a job when trigger=true.
        every_minutes:
          type: integer
          description: Minute interval for simple runtime or conditional schedules.
        schedule:
          oneOf:
            - $ref: '#/components/schemas/CronSpec'
            - $ref: '#/components/schemas/OnceSpec'
        text:
          type: string
        checker:
          $ref: '#/components/schemas/ConditionalChecker'
        on_trigger:
          $ref: '#/components/schemas/ConditionalTrigger'
        on_no_trigger:
          type: object
          additionalProperties: true
        on_error:
          type: object
          additionalProperties: true
        delivery_target:
          type: string
        metadata:
          type: object
          properties:
            managed_by:
              type: string
              enum: [agent]
            kind:
              type: string
              enum: [agent_heartbeat]
              description: Set to agent_heartbeat when the user wants a recurring wakeup/heartbeat prompt.
          additionalProperties: true
      required:
        - schedule_id
    Schedule:
      allOf:
        - $ref: '#/components/schemas/ScheduleInput'
        - type: object
          properties:
            agent_id:
              type: string
            provider_id:
              type: string
          required:
            - schedule_id
            - agent_id
            - provider_id
            - enabled
            - text

    ConditionalChecker:
      type: object
      properties:
        kind:
          type: string
          enum: [command]
        cmd:
          type: array
          items:
            type: string
        cwd:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        timeout_ms:
          type: integer
        max_output_bytes:
          type: integer
      required:
        - kind
        - cmd
    ConditionalTrigger:
      type: object
      properties:
        dedupe_by:
          type: string
          description: Common value is schedule_id+dedupe_key.
        job_text_from:
          type: string
          description: Common value is checker.text.
        metadata_from:
          type: string
          description: Common value is checker.metadata.
        continuation_contract:
          type: boolean
      additionalProperties: true
    CronSpec:
      type: object
      properties:
        kind:
          type: string
          enum: [cron]
        expr:
          type: string
          description: Five-field cron expression.
        tz:
          type: string
          description: IANA timezone, e.g. Europe/London.
      required:
        - kind
        - expr
        - tz
    OnceSpec:
      type: object
      properties:
        kind:
          type: string
          enum: [once]
        at:
          type: string
          description: ISO datetime with explicit Z or numeric offset, e.g. 2026-06-05T17:45:00+01:00.
        tz:
          type: string
          description: Optional IANA timezone label.
      required:
        - kind
        - at