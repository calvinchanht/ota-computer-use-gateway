openapi: 3.1.0
info:
  title: Boba OTA + Threaddex API Action
  version: 0.5.0
  description: "Boba single-host Action with strict path boundary: /ota for capability tools and /threaddex for native Job API delivery."
servers:
  - url: https://boba-api.unrealize.com
paths:
  /ota/api/v1/tool:
    post:
      operationId: gateway_request
      summary: Run one scoped Boba gateway tool call.
      description: Runs one scoped OTA capability tool call in workspace_id boba. Do not use this operation for Threaddex job retrieval or delivery; use the native /threaddex operations getJob, deliverJobProgress, deliverJob, and requestJobContinuation instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayRequest'
      responses:
        '200':
          description: Gateway tool result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /ota/api/v1/batch:
    post:
      operationId: gateway_batch
      summary: Run multiple scoped Boba gateway tool calls.
      description: Runs up to 20 scoped Boba OTA capability tool calls in order. Prefer this for multi-step read/write/read-back or checkpoint flows. Do not use batch for Threaddex job retrieval or delivery; use /threaddex operations directly.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayBatchRequest'
      responses:
        '200':
          description: Gateway batch result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /ota/api/v1/runs/{run_id}:
    get:
      operationId: get_gateway_run
      summary: Retrieve a previous Gateway JSON API run.
      description: Use this after a UI/stream interruption or when a previous response included api.run_id.
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stored run record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /threaddex/v1/schema:
    get:
      operationId: getThreaddexSchema
      summary: Read Boba Threaddex Job API schema metadata.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Job API schema metadata.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}:
    get:
      operationId: getJob
      summary: Read a Boba Threaddex job by id.
      description: Use the job_id from a Telegram job prompt. This is the correct operation for job retrieval. Do not call gateway_request with tool=getJob. Pass job_token when supplied by the job prompt.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: job_token
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Public job payload.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/progress:
    post:
      operationId: deliverJobProgress
      summary: Deliver non-final progress for a Boba Threaddex job.
      description: Use for Telegram job progress. This is the correct operation for progress delivery. Do not call gateway_request with tool=deliverJobProgress. Pass job_token when supplied by the job prompt.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: job_token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required: [text]
              properties:
                text:
                  type: string
                seq:
                  oneOf:
                    - type: integer
                    - type: string
                progress_seq:
                  oneOf:
                    - type: integer
                    - type: string
                protocol_version:
                  type: string
                schema_version:
                  type: string
      responses:
        '200':
          description: Progress delivery result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/deliver:
    post:
      operationId: deliverJob
      summary: Deliver the final result for a Boba Threaddex job.
      description: Use for the substantive final answer. Pass job_token when supplied by the job prompt. If this API call fails, report the full visible error details in chat with secrets-type information redacted instead of replying ok.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: job_token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required: [text]
              properties:
                text:
                  type: string
                protocol_version:
                  type: string
                schema_version:
                  type: string
      responses:
        '200':
          description: Final delivery result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/continuation:
    post:
      operationId: requestJobContinuation
      summary: Request a continuation for a Boba Threaddex job instead of final delivery.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: job_token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: true
      responses:
        '200':
          description: Continuation request result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    GatewayBatchRequest:
      type: object
      additionalProperties: false
      required: [steps]
      properties:
        idempotency_key:
          type: string
          description: Optional stable retry key. Use a unique key for batch writes/checkpoints.
        thread:
          type: object
          additionalProperties: true
          description: Explicit thread identity metadata.
        steps:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/GatewayStep'
    GatewayStep:
      type: object
      additionalProperties: false
      required: [tool, arguments]
      properties:
        tool:
          $ref: '#/components/schemas/GatewayToolName'
        arguments:
          $ref: '#/components/schemas/GatewayArguments'
    GatewayRequest:
      type: object
      additionalProperties: false
      required: [tool, arguments]
      properties:
        idempotency_key:
          type: string
          description: Optional stable retry key. Use a unique key for writes/checkpoints.
        thread:
          type: object
          additionalProperties: true
          description: Explicit thread identity metadata.
        tool:
          $ref: '#/components/schemas/GatewayToolName'
        arguments:
          $ref: '#/components/schemas/GatewayArguments'
    GatewayToolName:
      type: string
      enum:
        - heartbeat
        - workspace_status
        - get_workspace_policy
        - get_tool_profile
        - list_dir
        - stat_path
        - tree
        - read_file
        - read_file_chunk
        - read_file_lines
        - read_binary_file
        - write_file
        - write_binary_file
        - edit_file
        - search_files
        - git_status
        - git_diff
        - run_command
        - start_process
        - list_processes
        - read_process
        - write_process
        - stop_process
        - browser_status
        - list_browser_tabs
        - browser_visible_state
        - browser_tail
    GatewayArguments:
      type: object
      additionalProperties: true
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
      description: |
        Tool-specific arguments. For browser work, prefer high-level visible-state and tab-hygiene helpers before raw
        CDP: browser_visible_state returns human-visible text/buttons/forms/required-missing/file upload/error state;
        browser_manage_tabs lists/focuses/closes real page tabs; browser_click_and_wait clicks by selector/text and
        waits for visible text, selector, URL substring, or page stability; browser_upload_file_and_verify sets a
        workspace-relative file input and confirms expected filename/text appears in human-visible page text. For
        browser tab listing, list_browser_tabs defaults to real page targets only; pass type=all and
        include_iframes/include_workers/include_browser_ui only for raw CDP cleanup/debugging. For file tools include
        path; for browser/CDP include method/params/target_id/calls; for large-file tools include query, where,
        select, group_by, metrics, offsets, and dry_run fields as needed.
    WorkspaceStatusArguments:
      type: object
      additionalProperties: false
      properties:
        workspace_id:
          type: string
          enum: [boba]
    ListDirArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, path]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        path:
          type: string
        max_entries:
          type: integer
          minimum: 1
          maximum: 100
    ReadFileArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, path]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        path:
          type: string
        start_line:
          type: integer
          minimum: 1
        max_lines:
          type: integer
          minimum: 1
          maximum: 120
    WriteFileArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, path, content]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        path:
          type: string
        content:
          type: string
          maxLength: 4000
        overwrite:
          type: boolean
          default: false
    GitStatusArguments:
      type: object
      additionalProperties: false
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
    GitDiffArguments:
      type: object
      additionalProperties: false
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        max_bytes:
          type: integer
          minimum: 1
          maximum: 20000
    CheckpointThreadArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, title, summary]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        title:
          type: string
          maxLength: 120
        summary:
          type: string
          maxLength: 4000
        next_steps:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 300
    MemoryWriteArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, type, title, body]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        type:
          type: string
          enum: [note, decision, progress, handoff]
        title:
          type: string
          maxLength: 120
        body:
          type: string
          maxLength: 4000
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 60

    ListBrowserProfilesArguments:
      type: object
      additionalProperties: false
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
    BrowserStatusArguments:
      type: object
      additionalProperties: false
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
    ListBrowserTabsArguments:
      type: object
      additionalProperties: false
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
        include_urls:
          type: boolean
          description: Include full target URLs when true. Default false returns redacted origin-only URL metadata.
          default: false
    BrowserCdpBrowserCallArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, method]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
        method:
          type: string
          description: Raw Chrome DevTools Protocol browser-level method name.
        params:
          type: object
          additionalProperties: true
          default: {}
    BrowserCdpBrowserBatchArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, calls]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
        calls:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/CdpBatchStep'
    BrowserCdpCallArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, target_id, method]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
        target_id:
          type: string
        method:
          type: string
          description: Raw Chrome DevTools Protocol page-target method name.
        params:
          type: object
          additionalProperties: true
          default: {}
    BrowserCdpBatchArguments:
      type: object
      additionalProperties: false
      required: [workspace_id, target_id, calls]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        profile_label:
          type: string
        target_id:
          type: string
        calls:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/CdpBatchStep'
    CdpBatchStep:
      oneOf:
        - type: object
          additionalProperties: false
          required: [method]
          properties:
            method:
              type: string
            params:
              type: object
              additionalProperties: true
              default: {}
            wait_for:
              type: string
              enum: [page_load, dom_content_loaded]
            timeout_ms:
              type: integer
              minimum: 1
              maximum: 60000
        - type: object
          additionalProperties: false
          required: [delay_ms]
          properties:
            delay_ms:
              type: integer
              minimum: 0
              maximum: 60000
    LargeFileArguments:
      type: object
      additionalProperties: true
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          enum: [boba]
        path:
          type: string
        root:
          type: string
        query:
          type: string
        glob:
          type: string
        max_bytes:
          type: integer
          minimum: 1
          maximum: 250000
        max_matches:
          type: integer
          minimum: 1
          maximum: 200
        context_lines:
          type: integer
          minimum: 0
          maximum: 20
        start_line:
          type: integer
          minimum: 1
        max_lines:
          type: integer
          minimum: 1
          maximum: 2000
        line:
          type: integer
          minimum: 1
        before:
          type: integer
          minimum: 0
          maximum: 200
        after:
          type: integer
          minimum: 0
          maximum: 200
        select:
          type: array
          items:
            type: string
        columns:
          type: array
          items:
            type: string
        where:
          type: object
          additionalProperties: true
        sort:
          type: array
          items:
            type: object
            additionalProperties: true
        group_by:
          type: array
          items:
            type: string
        metrics:
          type: array
          items:
            type: object
            additionalProperties: true
        replacement:
          type: string
        expected_sha256:
          type: string
        dry_run:
          type: boolean
          default: true
        set:
          type: object
          additionalProperties: true
        allow_multiple:
          type: boolean
          default: false
        cmd:
          type: array
          description: Argv-style command, for example ["node", "-e", "console.log(1)"].
          minItems: 1
          items:
            type: string
        cwd:
          type: string
          description: Working directory relative to workspace root.
          default: .
        timeout_ms:
          type: integer
          minimum: 1
          maximum: 120000
          default: 30000
        max_stdout_bytes:
          type: integer
          minimum: 1
          maximum: 50000
          default: 20000
        max_stderr_bytes:
          type: integer
          minimum: 1
          maximum: 50000
          default: 8000
    GatewayResponse:
      type: object
      properties:
        ok:
          type: boolean
        summary:
          type: string
        data:
          type: object
          additionalProperties: true
        run:
          type: object
          additionalProperties: true
        api:
          type: object
          additionalProperties: true
      additionalProperties: true
