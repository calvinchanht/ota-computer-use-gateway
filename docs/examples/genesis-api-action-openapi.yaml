openapi: 3.1.0
info:
  title: Webchat Genesis OTA + Threaddex API Action
  version: 0.5.0
  description: 'Genesis single-host Action with strict path boundary: /ota for Gateway capability tools and /threaddex for native Job API delivery. Use /threaddex getJob/deliverJobProgress/deliverJob/requestJobContinuation for Telegram jobs; do not tunnel job lifecycle through gateway_request or run_command.'
servers:
- url: https://genesis-api.unrealize.com
paths:
  /ota/api/v1/tool:
    post:
      operationId: genesis_gateway_request
      summary: Run one scoped Webchat Genesis report call.
      description: Runs one read-only Webchat Genesis tool call. Always pass workspace_id=genesis.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayRequest'
      responses:
        '200':
          description: Gateway tool result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /ota/api/v1/batch:
    post:
      operationId: genesis_gateway_batch
      summary: Run multiple scoped Genesis gateway tool calls.
      description: Runs multiple /ota Gateway tool calls. Do not use this for Threaddex job retrieval or delivery.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayBatchRequest'
      responses:
        '200':
          description: Gateway batch result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /ota/api/v1/runs/{run_id}:
    get:
      operationId: get_genesis_gateway_run
      summary: Retrieve a previous Webchat Genesis run.
      description: Use this after a UI interruption or when a previous response included api.run_id.
      security:
      - bearerAuth: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Stored run record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
  /threaddex/v1/schema:
    get:
      operationId: getThreaddexSchema
      summary: Read Genesis Threaddex Job API schema metadata.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Job API schema metadata.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}:
    get:
      operationId: getJob
      summary: Read a Genesis Threaddex job by id.
      description: Use this for Telegram job retrieval. Do not call genesis_gateway_request with any threaddex_* tool.
      security:
      - bearerAuth: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
      - name: job_token
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Public job payload.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/progress:
    post:
      operationId: deliverJobProgress
      summary: Deliver non-final progress for a Genesis Threaddex job.
      description: Use this for Telegram job progress. Do not call genesis_gateway_request or run_command for progress delivery.
      security:
      - bearerAuth: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
      - name: job_token
        in: query
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required: [text]
              properties:
                text:
                  type: string
                seq:
                  oneOf:
                  - type: integer
                  - type: string
                progress_seq:
                  oneOf:
                  - type: integer
                  - type: string
                protocol_version:
                  type: string
                schema_version:
                  type: string
      responses:
        '200':
          description: Progress delivery result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/deliver:
    post:
      operationId: deliverJob
      summary: Deliver the final result for a Genesis Threaddex job.
      description: Use this for the substantive final answer. Do not call genesis_gateway_request or run_command for final delivery. If this API call fails, report the full visible error details in chat with secrets-type information redacted instead of replying ok.
      security:
      - bearerAuth: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
      - name: job_token
        in: query
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required: [text]
              properties:
                text:
                  type: string
                protocol_version:
                  type: string
                schema_version:
                  type: string
      responses:
        '200':
          description: Final delivery result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /threaddex/v1/job/{job_id}/continuation:
    post:
      operationId: requestJobContinuation
      summary: Request a continuation for a Genesis Threaddex job instead of final delivery.
      security:
      - bearerAuth: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
      - name: job_token
        in: query
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [checkpoint]
              properties:
                checkpoint:
                  type: string
                  description: What was completed, what remains, and why continuation is safe.
                reason:
                  type: string
                  description: Why continuation is needed, e.g. time_budget or goal_checkpoint.
                next_prompt:
                  type: string
                  description: "Optional prompt for the next turn. Defaults to cont job: <job_id>."
                max_continuations:
                  type: integer
                  minimum: 1
                  maximum: 99
                  description: Optional bounded max continuation count.
      responses:
        '200':
          description: Continuation request result.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    GatewayBatchRequest:
      type: object
      additionalProperties: false
      required:
      - steps
      properties:
        idempotency_key:
          type: string
          description: Optional stable retry key.
        thread:
          type: object
          additionalProperties: true
          description: Explicit thread identity metadata.
        steps:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/GatewayStep'
    GatewayStep:
      type: object
      additionalProperties: false
      required:
      - operation
      - arguments
      properties:
        operation:
          $ref: '#/components/schemas/GatewayOperationName'
        tool:
          $ref: '#/components/schemas/GatewayOperationName'
          description: Backward-compatible alias for operation. Prefer operation.
        arguments:
          $ref: '#/components/schemas/GatewayArguments'
    GatewayRequest:
      type: object
      additionalProperties: false
      required:
      - operation
      - arguments
      properties:
        idempotency_key:
          type: string
          description: Optional stable retry key.
        thread:
          type: object
          additionalProperties: true
          description: Explicit thread identity metadata.
        operation:
          $ref: '#/components/schemas/GatewayOperationName'
          description: OTA Gateway operation to run. Use this instead of the legacy tool alias.
        tool:
          $ref: '#/components/schemas/GatewayOperationName'
          description: Backward-compatible alias for operation. Prefer operation and do not send both unless they match.
        arguments:
          $ref: '#/components/schemas/GatewayArguments'
    GatewayOperationName:
      type: string
      enum:
      - heartbeat
      - workspace_status
      - get_workspace_policy
      - get_tool_profile
      - genesis_bootstrap
      - genesis_estate_overview
      - genesis_agent_deep_dive
      - genesis_host_deep_dive
      - genesis_safe_diagnostic
      - workspace_inventory
      - list_dir
      - stat_path
      - tree
      - read_file
      - read_file_chunk
      - read_file_lines
      - read_binary_file
      - search_files
      - git_status
      - git_diff
      - github
      - git_push_current_branch
      - get_project_context
      - get_context_snapshot
      - get_agent_bootstrap
      - memory_search
      - list_skills
      - read_skill
      - approval_status
      - list_artifacts
      - write_file
      - write_binary_file
      - edit_file
      - delete_file
      - delete_path
      - memory_write
      - record_artifact
      - record_progress
      - record_decision
      - record_handoff
      - update_current_task
      - checkpoint_thread
      - propose_patch
      - apply_patch
      - run_command
      - start_process
      - list_processes
      - read_process
      - write_process
      - stop_process
      - list_browser_profiles
      - browser_status
      - list_browser_tabs
      - browser_visible_state
      - browser_manage_tabs
      - browser_click_and_wait
      - browser_upload_file_and_verify
      - browser_cdp_browser_call
      - browser_cdp_browser_batch
      - browser_cdp_call
      - browser_cdp_batch
      - cua_driver_status
      - cua_driver_call
      - cua_driver_batch
      - run_configured_command
    GatewayArguments:
      type: object
      additionalProperties: true
      required:
      - workspace_id
      properties:
        workspace_id:
          type: string
          enum:
          - genesis
        agent:
          type: string
          description: Agent id/name for genesis_agent_deep_dive, e.g. catalyst, cortex, boba, hexa.
        host:
          type: string
          description: Host/machine-profile id/name for genesis_host_deep_dive.
        scope:
          type: string
          enum:
          - estate
          - agent
          - host
          description: Scope for genesis_safe_diagnostic.
        target:
          type: string
          description: Agent or host target for scoped genesis_safe_diagnostic.
        path:
          type: string
        content:
          type: string
        overwrite:
          type: boolean
        command:
          type: array
          items:
            type: string
        profile_label:
          type: string
        target_id:
          type: string
        selector:
          type: string
        text:
          type: string
        method:
          type: string
        params:
          type: object
          additionalProperties: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        max_entries:
          type: integer
        max_lines:
          type: integer
        max_bytes:
          type: integer
      description: Tool-specific arguments. Always include workspace_id=genesis. Use get_tool_profile and get_workspace_policy
        early. This broad private schema intentionally exposes Genesis workspace/browser/computer/machine/estate tools while
        relying on server-side auth, workspace policy, and Calvin-approved workflow boundaries. There is no hidden path/secret/glob deny layer.
    GatewayResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        summary:
          type: string
        data:
          type: object
          additionalProperties: true
        api:
          type: object
          additionalProperties: true
